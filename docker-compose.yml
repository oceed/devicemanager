version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: device-manager-backend
    network_mode: host
    privileged: true
    restart: unless-stopped
    volumes:
      # Map dbus system socket to allow container to control host NetworkManager
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      # Map sys filesystem to read thermal zones and NPU loads
      - /sys:/sys
      # Optional: map NetworkManager configs if needed to read profile files
      - /etc/NetworkManager:/etc/NetworkManager
      # Map parent directory to detect if sister projects exist on host
      - ../:/project_siblings:ro
    environment:
      - SECRET_KEY=supersecretkey_protectqube_voiceguard_orange_pi
      - ADMIN_USERNAME=admin
      # bcrypt hash for "admin123"
      - ADMIN_PASSWORD_HASH=$$2b$$12$$8Yq9prElz7KsWNVJCMNrguSZqV97huYLcIueffa6yW/zfdBQj7OFG
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: device-manager-frontend
    network_mode: host
    restart: unless-stopped
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
